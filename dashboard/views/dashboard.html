<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Botify X — Dashboard</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d1117;--card:#161b22;--s2:#21262d;--border:#30363d;
  --green:#2ea043;--gh:#3fb950;--gdim:#0d2016;--gglow:#2ea04355;
  --text:#c9d1d9;--muted:#8b949e;--red:#f85149;--redbg:#160b0b;--rdim:#3d1111}
body{min-height:100vh;background:var(--bg);font-family:'Segoe UI',system-ui,sans-serif;color:var(--text)}
header{background:var(--card);border-bottom:1px solid var(--border);padding:.7rem 1.5rem;
  display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.brand{font-weight:700;color:#fff;font-size:.95rem}
.brand span{color:var(--muted);font-weight:400;font-size:.75rem;margin-left:.35rem}
a.out{font-size:.78rem;color:var(--muted);text-decoration:none}
main{max-width:680px;margin:0 auto;padding:1.75rem 1.25rem}
h2{font-size:.95rem;font-weight:600;color:var(--text);margin-bottom:.9rem}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:1.3rem 1.4rem;margin-bottom:1.1rem}
/* status */
.srow{display:flex;align-items:center;gap:.8rem}
.dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.dot.on{background:var(--green);box-shadow:0 0 8px var(--gglow)}
.dot.off{background:var(--muted)}
.sinfo strong{display:block;font-size:.93rem;font-weight:600}
.sinfo small{font-size:.76rem;color:var(--muted)}
.badge{display:inline-block;padding:.18rem .6rem;border-radius:20px;font-size:.68rem;font-weight:700;
  text-transform:uppercase;letter-spacing:.06em;margin-left:.4rem;vertical-align:middle}
.badge.on{background:var(--gdim);color:var(--gh);border:1px solid var(--green)}
.badge.off{background:var(--s2);color:var(--muted);border:1px solid var(--border)}
/* add user */
.fp{display:flex;align-items:center;gap:.5rem;background:var(--s2);border:1px solid var(--border);
  border-radius:5px;padding:.38rem .75rem;font-size:.73rem;color:var(--muted);margin-bottom:.9rem;width:fit-content}
.desc{font-size:.78rem;color:var(--muted);margin-bottom:.9rem;line-height:1.6}
label{display:block;font-size:.78rem;color:var(--muted);margin-bottom:.3rem;font-weight:500}
.row{display:flex;gap:.55rem}
input[type=tel],input[type=text]{flex:1;padding:.58rem .8rem;background:var(--bg);
  border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:.88rem;
  outline:none;transition:border-color .15s}
input:focus{border-color:var(--green)}
.btn{padding:.6rem 1.1rem;background:var(--green);color:#fff;font-weight:700;font-size:.84rem;
  border:none;border-radius:6px;cursor:pointer;white-space:nowrap;transition:background .15s}
.btn:hover{background:var(--gh)}.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-sm{padding:.32rem .65rem;font-size:.76rem;background:var(--rdim);color:var(--red);
  border:1px solid var(--rdim);border-radius:5px;cursor:pointer;font-weight:600}
.btn-sm:hover{background:var(--red);color:#fff}
.alert{border-radius:6px;padding:.55rem .8rem;font-size:.8rem;margin-top:.7rem;display:none}
.alert.ok{background:var(--gdim);border:1px solid var(--green);color:var(--gh)}
.alert.err{background:var(--redbg);border:1px solid var(--red);color:var(--red)}
/* table */
.tw{overflow-x:auto;margin-top:.6rem}
table{width:100%;border-collapse:collapse;font-size:.82rem}
th{text-align:left;padding:.45rem .7rem;color:var(--muted);font-weight:500;
  border-bottom:1px solid var(--border);font-size:.72rem;text-transform:uppercase;letter-spacing:.05em}
td{padding:.5rem .7rem;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
.pill{display:inline-block;padding:.15rem .55rem;border-radius:20px;font-size:.69rem;font-weight:700}
.pill.ok{background:var(--gdim);color:var(--gh);border:1px solid var(--green)}
.pill.exp{background:var(--redbg);color:var(--red);border:1px solid var(--rdim)}
.empty{text-align:center;color:var(--muted);padding:1.2rem;font-size:.8rem}
</style>
</head>
<body>
<header>
  <div class="brand">⚡ Botify X <span>v1.0.3</span></div>
  <a class="out" href="/panel/logout">Logout</a>
</header>
<main>

  <!-- Bot Status -->
  <div class="card">
    <h2>Bot Status</h2>
    <div class="srow">
      <div class="dot" id="dot"></div>
      <div class="sinfo">
        <strong id="slabel">Checking...</strong>
        <small id="ssub"></small>
      </div>
    </div>
  </div>

  <!-- Add User -->
  <div class="card">
    <h2>Add User — 30 Day Access</h2>
    <div class="fp">🛡️ Access portal · 30-day duration</div>
    <p class="desc">
      Enter the user's phone number to grant them 30 days of bot command access.
      All commands are controlled directly on WhatsApp — nothing here.
    </p>
    <label>Phone number with country code</label>
    <div class="row">
      <input type="tel" id="addphone" placeholder="e.g. 2348012345678"/>
      <button class="btn" onclick="addUser()">Add User</button>
    </div>
    <div class="alert" id="addalert"></div>
  </div>

  <!-- Users List -->
  <div class="card">
    <h2>Active Users</h2>
    <div class="tw">
      <table>
        <thead><tr><th>Phone</th><th>Expires</th><th>Status</th><th></th></tr></thead>
        <tbody id="tbody"><tr><td colspan="4" class="empty">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>

</main>
<script>
function fmt(ts){return new Date(ts).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});}

async function loadStatus(){
  try{
    const d=await fetch('/panel/api/status').then(r=>r.json());
    const dot=document.getElementById('dot'),lbl=document.getElementById('slabel'),sub=document.getElementById('ssub');
    if(d.connected){
      dot.className='dot on';
      lbl.innerHTML='Connected <span class="badge on">Online</span>';
      sub.textContent=d.phone?'Paired with +'+d.phone:'Session active';
    }else{
      dot.className='dot off';
      lbl.innerHTML='Disconnected <span class="badge off">Offline</span>';
      sub.textContent='Bot is not connected to WhatsApp';
    }
  }catch{}
}

async function loadUsers(){
  try{
    const d=await fetch('/panel/api/users').then(r=>r.json());
    const tb=document.getElementById('tbody');
    if(!d.users||!d.users.length){tb.innerHTML='<tr><td colspan="4" class="empty">No users added yet.</td></tr>';return;}
    const now=Date.now();
    tb.innerHTML=d.users.map(u=>`<tr>
      <td>+${u.number}</td>
      <td>${fmt(u.expiry)}</td>
      <td>${u.expiry>now?'<span class="pill ok">Active</span>':'<span class="pill exp">Expired</span>'}</td>
      <td><button class="btn-sm" onclick="removeUser('${u.number}')">Remove</button></td>
    </tr>`).join('');
  }catch{}
}

async function addUser(){
  const phone=document.getElementById('addphone').value.trim();
  if(!phone){showAlert('addalert','err','Please enter a phone number.');return;}
  try{
    const d=await fetch('/panel/api/users',{
      method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone})
    }).then(r=>r.json());
    if(d.error){showAlert('addalert','err',d.error);return;}
    showAlert('addalert','ok',`✅ +${d.user.number} added — expires ${fmt(d.user.expiry)}`);
    document.getElementById('addphone').value='';
    loadUsers();
  }catch(e){showAlert('addalert','err','Error: '+e.message);}
}

async function removeUser(num){
  if(!confirm('Remove user +'+num+'?'))return;
  await fetch('/panel/api/users/'+num,{method:'DELETE'});
  loadUsers();
}

function showAlert(id,cls,msg){
  const e=document.getElementById(id);
  e.className='alert '+cls; e.textContent=msg; e.style.display='block';
  setTimeout(()=>e.style.display='none',5000);
}

loadStatus(); loadUsers();
setInterval(loadStatus,8000);
</script>
</body>
</html>
