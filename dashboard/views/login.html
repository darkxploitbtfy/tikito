<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Botify X — Login</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d1117;--card:#161b22;--border:#30363d;--green:#2ea043;--gh:#3fb950;
  --text:#c9d1d9;--muted:#8b949e;--red:#f85149;--redbg:#160b0b}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:var(--bg);font-family:'Segoe UI',system-ui,sans-serif;color:var(--text);padding:1rem}
.wrap{width:100%;max-width:340px}
.logo{text-align:center;margin-bottom:1.75rem}
.logo-icon{font-size:2.8rem;display:block;margin-bottom:.5rem}
.logo h1{font-size:1.45rem;font-weight:700;color:#fff;letter-spacing:-.4px}
.logo p{font-size:.72rem;color:var(--muted);margin-top:.2rem;text-transform:uppercase;letter-spacing:.1em}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1.6rem 1.4rem}
.err{background:var(--redbg);border:1px solid var(--red);border-radius:6px;color:var(--red);
  padding:.55rem .8rem;font-size:.8rem;margin-bottom:.9rem;display:none}
label{display:block;font-size:.78rem;color:var(--muted);margin-bottom:.3rem;font-weight:500}
input{width:100%;padding:.58rem .8rem;background:var(--bg);border:1px solid var(--border);
  border-radius:6px;color:var(--text);font-size:.88rem;outline:none;transition:border-color .15s;margin-bottom:.9rem}
input:focus{border-color:var(--green)}
.btn{width:100%;padding:.68rem;background:var(--green);color:#fff;font-weight:700;font-size:.88rem;
  border:none;border-radius:6px;cursor:pointer;transition:background .15s,transform .1s}
.btn:hover{background:var(--gh)}.btn:active{transform:scale(.98)}.btn:disabled{opacity:.5;cursor:not-allowed}
.foot{text-align:center;margin-top:1rem;font-size:.7rem;color:var(--muted)}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <span class="logo-icon">⚡</span>
    <h1>Botify X</h1>
    <p>Admin Panel · v1.0.3</p>
  </div>
  <div class="card">
    <div class="err" id="err">⚠️ Invalid username or password.</div>
    <form id="form">
      <label>Username</label>
      <input type="text" id="u" name="username" placeholder="Username" autocomplete="username" required/>
      <label>Password</label>
      <input type="password" id="p" name="password" placeholder="Password" autocomplete="current-password" required/>
      <button type="submit" class="btn" id="btn">Sign In</button>
    </form>
  </div>
  <div class="foot">Botify X &copy; 2024</div>
</div>
<script>
  if(new URLSearchParams(location.search).get('error')) document.getElementById('err').style.display='block';
  document.getElementById('form').onsubmit=async function(e){
    e.preventDefault();
    const btn=document.getElementById('btn');
    btn.disabled=true; btn.textContent='Signing in...';
    const body=new URLSearchParams();
    body.set('username',document.getElementById('u').value);
    body.set('password',document.getElementById('p').value);
    try{
      const r=await fetch('/panel/login',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:body.toString(),redirect:'follow'});
      window.location.href=r.url;
    }catch{
      document.getElementById('err').style.display='block';
      btn.disabled=false; btn.textContent='Sign In';
    }
  };
</script>
</body>
</html>
